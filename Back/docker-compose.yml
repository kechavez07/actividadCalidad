version: '3.8'

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: postgres-db
    # ports: - "5432:5432"  # INTENCIONALMENTE DESHABILITADO - no exponer Postgres a la red externa
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - ./db-init/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ticket-network

  banco-service:
    build: ./banco-service
    container_name: banco-service
    ports:
      - "18081:8081"
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - ticket-network

  federacion-service:
    build: ./federacion-service
    container_name: federacion-service
    ports:
      - "18082:8082"
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - ticket-network

  web-client:
    build: ./ticketpremium-web
    container_name: web-client
    ports:
      - "8080:80"
    depends_on:
      - banco-service
      - federacion-service
    networks:
      - ticket-network

networks:
  ticket-network:
    driver: bridge
