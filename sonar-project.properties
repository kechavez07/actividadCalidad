# ──────────────────────────────────────────────────────────────────────────────
# SonarCloud — QA Audit TicketPremium FIFA 2026
#
# Ejecutar:
#   sonar-scanner -Dsonar.token=<TU_TOKEN>
# ──────────────────────────────────────────────────────────────────────────────

sonar.projectKey=GuamanJordan_actividadCalidadQA
sonar.projectName=QA Audit - TicketPremium FIFA 2026
sonar.projectVersion=1.0
sonar.organization=guamanjordan

# ── Fuentes ──────────────────────────────────────────────────────────────────
sonar.sources=Frontend/packages/shared,Frontend/apps/web/src
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/build/**,Frontend/apps/desktop/**

# ── Tests ────────────────────────────────────────────────────────────────────
sonar.tests=Frontend/packages/shared
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts

# ── Lenguaje ─────────────────────────────────────────────────────────────────
sonar.language=ts
sonar.sourceEncoding=UTF-8

# ── Cobertura ─────────────────────────────────────────────────────────────────
# Generar antes con: cd Frontend/packages/shared && bun test --coverage --coverage-reporter=lcov
sonar.javascript.lcov.reportPaths=Frontend/packages/shared/coverage/lcov.info

# ── Host ─────────────────────────────────────────────────────────────────────
sonar.host.url=https://sonarcloud.io
